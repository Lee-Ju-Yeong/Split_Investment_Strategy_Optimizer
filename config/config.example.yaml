# 로컬에서 config/config.yaml로 복사 후 값을 수정하세요.

database:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "CHANGE_ME"
  database: "stocks"

backtest_settings:
  start_date: "2015-01-01"
  end_date: "2020-12-31"
  initial_cash: 10000000
  save_full_trade_history: false

strategy_params:
  # Example profiles:
  # - release-safe / promotion candidate:
  #   universe_mode: strict_pit
  #   candidate_source_mode: tier
  #   tier_hysteresis_mode: strict_hysteresis_v1
  #   candidate_lookup_error_policy: raise
  # - research-only / non-promotion:
  #   universe_mode: optimistic_survivor
  #   candidate_lookup_error_policy: raise

  # Price basis for backtesting/simulation:
  # - adjusted: use adj_close/adj_ratio derived OHLC (recommended)
  # - raw: use original close/open/high/low
  price_basis: "adjusted"
  # In adjusted mode, start_date must be >= this date.
  adjusted_price_gate_start_date: "2013-11-20"
  # Backtest universe mode:
  # - strict_pit: 승격/승인 트랙 기본값
  # - optimistic_survivor: 연구/비승격 트랙 전용
  universe_mode: "strict_pit"

  max_stocks: 20
  order_investment_ratio: 0.02
  additional_buy_drop_rate: 0.04
  sell_profit_rate: 0.04
  additional_buy_priority: "lowest_order"
  cooldown_period_days: 5
  stop_loss_rate: -0.15
  max_splits_limit: 10
  max_inactivity_period: 90
  
  # [Issue #67/#97] Strict-only runtime candidate policy
  # - runtime 표면은 candidate_source_mode='tier' 하나만 사용합니다.
  # - use_weekly_alpha_gate는 strict-only runtime에서 설정하지 않습니다.
  candidate_source_mode: "tier"
  min_liquidity_20d_avg_value: 0
  # Empirical baseline (2026-03-07):
  # - as-of sampled windows around low-coverage periods stayed above 0.45
  # - exact-snapshot proxy sample minimum was ~0.4525
  min_tier12_coverage_ratio: 0.45

  # [Issue #67] Entry/Hold Hysteresis Policy
  # - 이 값은 "Tier1이 비었을 때 Entry를 Tier2까지 허용할지"와
  #   "보유 중 추가매수를 Tier1~2까지만 허용할지"를 묶어 제어합니다.
  # - strict_hysteresis_v1:
  #   Entry는 Tier1 only(비면 신규진입 skip), Hold/Add는 Tier1~2만 허용
  tier_hysteresis_mode: "strict_hysteresis_v1"
  # Tier candidate lookup error handling:
  # - raise: 즉시 예외 발생(감사/재현 우선, 권장)
  # - skip: 해당일 신규진입 스킵 후 계속 진행
  candidate_lookup_error_policy: "raise"

execution_params:
  buy_commission_rate: 0.00015
  sell_commission_rate: 0.00015
  sell_tax_rate: 0.0018

paths:
  results_dir: "results"

# Data pipeline (src/main_script.py)
# - relative paths are resolved from project root
data_pipeline:
  paths:
    condition_search_files_folder: "data/raw_data"
    processed_data_folder: "data/processed_data"
    filtered_stocks_csv_path: "data/processed_data/mapped_weekly_filtered_stocks_FINAL.csv"
  flags:
    use_gpu: false
    update_company_info_db: false
    process_hts_csv_files: false
    load_filtered_stocks_csv: true
    collect_ohlcv_data: true
    force_recollect_ohlcv: false
    calculate_indicators: true

parameter_space:
  max_stocks:
    type: "list"
    values: [20, 30, 40]
  order_investment_ratio:
    type: "linspace"
    start: 0.01
    stop: 0.05
    num: 5
  additional_buy_drop_rate:
    type: "linspace"
    start: 0.02
    stop: 0.06
    num: 3
  sell_profit_rate:
    type: "linspace"
    start: 0.02
    stop: 0.06
    num: 3
  additional_buy_priority:
    type: "list"
    values: [0, 1]
  stop_loss_rate:
    type: "list"
    values: [-0.15]
  max_splits_limit:
    type: "list"
    values: [10, 15]
  max_inactivity_period:
    type: "list"
    values: [90]

walk_forward_settings:
  total_folds: 6
  # `period_length_days` is interpreted by `period_length_basis`.
  # Current Magic Split baseline uses trading-day windows:
  # - 378 trading days ~= about 18 months
  # - 365 trading days should be treated as exploratory/provisional only
  period_length_basis: "trading_days"
  period_length_days: 378
  # Optional manifest metadata for WFO artifacts.
  # - `legacy_wfo`: 기존 overlap/mean aggregation 경로를 그대로 사용하며 provisional로 기록합니다.
  # - `promotion_evaluation`: frozen shortlist 기반 single-anchor non-overlap anchored WFO를 사용합니다.
  # - `research_start_date_robustness`: frozen shortlist multi-anchor evaluation을 사용합니다.
  lane_type: "legacy_wfo"
  # promotion_evaluation에서는 decision_date(후보 고정 기준일)가 필수입니다.
  decision_date: "2026-03-14"
  research_data_cutoff: "2021-12-31"
  promotion_data_cutoff: "2021-12-31"
  shortlist_hash: null
  promotion_mode: "frozen_shortlist_single_anchor_eval"
  promotion_selection_metric: "calmar_ratio"
  promotion_shortlist_path: null
  selection_contract:
    version: "promotion_holdout_selector_v1"
    hard_gate_version: "promotion_hard_gate_v1"
    min_promotion_fold_pass_rate: 0.70
    min_oos_is_calmar_ratio_median: 0.60
    max_oos_mdd_depth_p95: 0.25
    per_fold_min_oos_calmar_ratio: 0.0
    reserve_count: 2
  research_mode: "frozen_shortlist_multi_anchor_eval"
  research_selection_metric: "calmar_ratio"
  research_shortlist_path: null
  research_anchor_start_dates: []
  anchor_set_id: "manual_anchor_set"
  anchor_spacing_rule: "manual_explicit"
  coverage_normalized: true
  publication_lag_policy: "unspecified"
  ticker_universe_snapshot_id: null
  engine_version_hash: null
  # Optional holdout window for `holdout_manifest.json`.
  canonical_promotion_wfo_end: "2024-12-31"
  canonical_holdout_start: "2025-01-01"
  canonical_holdout_end: "2025-11-30"
  holdout_start: "2025-01-01"
  holdout_end: "2025-11-30"
  holdout_auto_execute: false
  # Optional holdout adequacy gate:
  # 값이 설정되면 holdout adequacy metric이 이 기준을 못 넘을 때 approval-grade를 강등합니다.
  holdout_adequacy_thresholds:
    min_trade_count: 20
    min_closed_trade_count: 10
    min_distinct_entry_months: 6
    min_avg_invested_capital_ratio: 0.20
    max_cash_drag_ratio: 0.80
  # Optional waiver:
  # 짧은 holdout 또는 adequacy threshold 미달을 예외 승인하려면 이유를 남깁니다.
  holdout_waiver_reason: null
  holdout_contaminated_ranges:
    - start: "2025-12-01"
      end: "2026-01-31"
  # CPU selection quality check(선택 단계 품질 확인, optional):
  # GPU가 고른 finalist shortlist를 CPU로 다시 돌려 selection 단계 품질을 확인합니다.
  # 최종 승인 SSOT는 이 필드가 아니라 `final candidate CPU audit(최종 후보 CPU 검산)`입니다.
  # research lane에서는 보통 `not_applicable`로 기록됩니다.
  cpu_certification_enabled: true
  cpu_certification_top_n: 5
  cpu_certification_metric: "calmar_ratio"
